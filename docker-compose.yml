services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    ports:
      - "8554:8554"
      - "8888:8888"
      - "8889:8889"
      - "1935:1935"
      - "8189:8189/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    restart: unless-stopped

  api:
    build: ./api
    container_name: var_api
    ports:
      - "8000:8000"
    environment:
      - MEDIA_HOST=localhost #change localhost to test/ ip to connect through phone/ webdomain when deployed
    volumes:
      - ./data/meta:/data/meta
    restart: unless-stopped

  viewer:
    image: nginx:alpine
    container_name: var_viewer
    ports:
      - "8081:80"
    volumes:
      - ./viewer:/usr/share/nginx/html:ro
      - ./viewer/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
